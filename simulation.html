<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARTEMIS II - Utility AI Mission Simulation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{--red:#FC3D21;--bg:#040810;--dim:rgba(232,237,245,0.3);--accent:#4A9EF5;--out:#2E6BBF;--inb:#E87040;--green:#0C6;--warn:#F5A623;--crit:#FC3D21}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#E8EDF5;font-family:'Space Grotesk',system-ui,sans-serif;
  overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none;position:fixed;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:2}
#hud-top{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(30,101,200,0.1)}
.hud-block{display:flex;flex-direction:column}.hud-block.right{align-items:flex-end}
.hl{font-family:'Space Mono',monospace;font-size:9px;color:rgba(74,158,245,0.5);letter-spacing:2px}
.hv{font-family:'Space Mono',monospace;font-size:clamp(16px,3.5vw,24px);font-weight:700;color:#fff;line-height:1.2}
.hv span{font-size:9px;font-weight:400;color:var(--dim);margin-left:2px}
.ptag{display:inline-block;padding:2px 8px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;border:1px solid;margin-bottom:4px}
#phase-label{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;
  font-size:clamp(11px,2.5vw,15px);font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.5);z-index:2;text-align:center}
#timer{position:absolute;bottom:16px;left:16px;font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);z-index:2}
#legend{position:absolute;bottom:16px;right:16px;font-family:'Space Mono',monospace;font-size:10px;z-index:2;text-align:right;line-height:1.8}
#controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;z-index:2}
#controls button{background:rgba(11,61,145,0.1);border:1px solid rgba(30,101,200,0.2);color:var(--dim);
  padding:6px 14px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
#controls button:active{background:rgba(11,61,145,0.3)}

/* Mobile */
@media(max-width:600px){
  #hud-top{padding:6px 8px}
  .hv{font-size:clamp(14px,3vw,20px)}
  #phase-label{bottom:42px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="hud-top">
  <div class="hud-block"><div class="hl">VELOCITY</div><div class="hv" id="hS">0<span> KM/S</span></div>
    <div class="hl" style="margin-top:4px">ALTITUDE</div><div class="hv" id="hA">0<span> KM</span></div></div>
  <div class="hud-block right"><div class="ptag" id="hP">---</div>
    <div class="hl" style="margin-top:4px">MISSION DAY</div><div class="hv" id="hD">0</div>
  </div>
</div></div>
<div id="phase-label"></div>
<div id="timer">T+ 00:00:00</div>
<div id="legend"><span style="color:var(--out)">──往路 OUTBOUND</span><br><span style="color:var(--inb)">── 復路 INBOUND</span></div>
<div id="controls">
  <button id="reset" onclick="resetSim()">⟲ RESET</button>
  <button id="pause" onclick="togglePause()">❚❚ PAUSE</button>
  <button id="speed">x20</button>
</div>

<!-- AI Decision Panel -->
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;const dpr=Math.min(devicePixelRatio||1,2);
function resize(){W=innerWidth;H=innerHeight;C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';X.setTransform(dpr,0,0,dpr,0,0)}
resize();addEventListener('resize',resize);

// === CONSTANTS ===
const G=6.674e-11,ME=5.972e24,MM=7.342e22,RE=6371e3,RM=1737e3,DEM=384400e3,MT=27.32*86400;

// ============================================================
// MISSION SIMULATION
// ============================================================

// Initialize simulation state
function initSimulation() {
  const r0 = RE + 300e3, v0 = Math.sqrt(G*ME/r0);
  const moonA0 = Math.PI * 0.22;
  const transitDays = 5.0, moonLead = transitDays * 86400 * (2*Math.PI/MT);
  const futMA = moonA0 + moonLead;
  const idealAng = futMA - Math.PI;

  let bx = Math.cos(idealAng)*r0, by = Math.sin(idealAng)*r0;
  let bvx = -Math.sin(idealAng)*v0, bvy = Math.cos(idealAng)*v0;

  // Apply TLI burn
  const spd = Math.hypot(bvx, bvy);
  const sma = (r0 + DEM*1.02) / 2;
  const vTarget = Math.sqrt(G*ME*(2/r0 - 1/sma));
  const dv = vTarget - spd;
  bvx += bvx/spd * dv;
  bvy += bvy/spd * dv;

  return {
    x: bx, y: by, vx: bvx, vy: bvy,
    moonAngle: moonA0,
    moonX: Math.cos(moonA0)*DEM, moonY: Math.sin(moonA0)*DEM,
    t: 0, phase: 'tli',
    passedFarSide: false, closestMoon: Infinity
  };
}

function stepPhysics(state, dt) {
  const mx = Math.cos(state.moonAngle)*DEM, my = Math.sin(state.moonAngle)*DEM;
  state.moonX = mx; state.moonY = my;

  // Earth gravity
  let dx = -state.x, dy = -state.y;
  let r2 = dx*dx + dy*dy, rr = Math.sqrt(r2);
  let acc = G*ME/r2;
  state.vx += (dx/rr)*acc*dt;
  state.vy += (dy/rr)*acc*dt;

  // Moon gravity
  dx = mx - state.x; dy = my - state.y;
  r2 = dx*dx + dy*dy; rr = Math.sqrt(r2);
  if (rr > RM*0.5) {
    acc = G*MM/r2;
    state.vx += (dx/rr)*acc*dt;
    state.vy += (dy/rr)*acc*dt;
  }

  state.x += state.vx * dt;
  state.y += state.vy * dt;
  state.moonAngle += (2*Math.PI/MT) * dt;
  state.t += dt;

  // Phase detection
  const dM = Math.hypot(state.x - mx, state.y - my);
  const dE = Math.hypot(state.x, state.y);
  if (dM < state.closestMoon) state.closestMoon = dM;

  if (dM < 200000e3 && !state.passedFarSide) {
    const m2e = Math.atan2(-my, -mx);
    const m2s = Math.atan2(state.y - my, state.x - mx);
    let ad = ((m2s - m2e) % (2*Math.PI) + 3*Math.PI) % (2*Math.PI) - Math.PI;
    if (Math.abs(ad) > Math.PI*0.5) state.passedFarSide = true;
  }

  let ph = state.t < 600 ? 'tli' : 'outbound';
  if (dM < 120000e3 && !state.passedFarSide) ph = 'flyby';
  else if (state.passedFarSide && dM < 200000e3) ph = 'flyby';
  else if (state.passedFarSide) ph = 'inbound';

  if (state.passedFarSide && dE < RE + 20000e3 && ph === 'inbound') ph = 'reentry';

  state.phase = ph;


  return dE > DEM * 4 || ph === 'reentry';
}

// Apply AI burn decision to physics



// ============================================================
// RENDERING
// ============================================================

// Stars
let stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()+.2,b:Math.random()*.35+.25});

// Trail history
const trail = [];

let camX=0,camY=0,zoom=1;
const DS=0.0000006;
const TILT=0.55; // oblique view: compress Y to simulate ~55° viewing angle
function scr(x,y){const s=DS*zoom;return{x:W/2+(x-camX)*s,y:H/2+(y-camY)*s*TILT}}

function updateCam(state){
  const dE=Math.hypot(state.x,state.y);
  const dM=Math.hypot(state.x-state.moonX,state.y-state.moonY);
  const moonScreenR=DEM*DS; // moon orbit radius in screen px at zoom=1
  let tZoom,tCX,tCY;

  if(missionComplete){
    // After splashdown: zoom out to show full figure-8 trajectory
    tZoom=W/(moonScreenR*2.3);
    tCX=0;tCY=0;
  }else if(state.phase==='tli'){
    // Launch: zoom in on Earth
    tZoom=4.0;tCX=0;tCY=0;
  }else if(dM<DEM*0.15){
    // Moon approach: zoom in on Moon-ship area
    const closeness=1-dM/(DEM*0.15);
    tZoom=2.0+closeness*4.0;
    tCX=state.moonX*0.6+state.x*0.4;
    tCY=state.moonY*0.6+state.y*0.4;
  }else if(state.passedFarSide&&dE<DEM*0.3){
    // Returning near Earth: zoom in
    const closeness=1-dE/(DEM*0.3);
    tZoom=1.5+closeness*2.5;
    tCX=state.x*0.3;tCY=state.y*0.3;
  }else{
    // Transit: keep Earth, ship, and Moon all visible
    // Zoom so that ship distance fits comfortably
    const maxDist=Math.max(dE,dM)*1.1;
    tZoom=Math.max(0.6,W/(maxDist*DS*2.5));
    tZoom=Math.min(tZoom,1.8);
    tCX=state.x*0.2;tCY=state.y*0.2;
  }
  camX+=(tCX-camX)*0.04;camY+=(tCY-camY)*0.04;zoom+=(tZoom-zoom)*0.04;
}

function drawStars(){const ox=camX*DS*.01*zoom,oy=camY*DS*.01*zoom;
  for(const s of stars){const sx=((s.x*W*1.5-ox)%W+W)%W,sy=((s.y*H*1.5-oy)%H+H)%H;
    X.globalAlpha=s.b;X.fillStyle='#C8D8F0';X.beginPath();X.arc(sx,sy,s.r,0,6.283);X.fill()}X.globalAlpha=1}

function drawBody(wx,wy,radius,colors,label){
  const p=scr(wx,wy),r=Math.max(radius*0.5,radius*zoom);
  const gg=X.createRadialGradient(p.x,p.y,r*.2,p.x,p.y,r*3);
  gg.addColorStop(0,colors[2]);gg.addColorStop(1,'transparent');
  X.fillStyle=gg;X.beginPath();X.arc(p.x,p.y,r*3,0,6.283);X.fill();
  const g=X.createRadialGradient(p.x-r*.3,p.y-r*.3,r*.05,p.x,p.y,r);
  g.addColorStop(0,colors[0]);g.addColorStop(1,colors[1]);
  X.fillStyle=g;X.beginPath();X.arc(p.x,p.y,r,0,6.283);X.fill();
  X.fillStyle='rgba(200,210,230,0.25)';X.font=`${Math.max(8,9*zoom)}px Space Mono,monospace`;
  X.textAlign='center';X.fillText(label,p.x,p.y+r+13);
}

function drawMoonOrbit(moonX,moonY){
  const p=scr(0,0);const r=DEM*DS*zoom;
  X.strokeStyle='rgba(107,170,238,0.25)';X.lineWidth=1;X.setLineDash([6,6]);
  X.beginPath();X.ellipse(p.x,p.y,r,r*TILT,0,0,6.283);X.stroke();X.setLineDash([]);
  // Moon orbit label
  const la=Math.PI*-0.15;
  const lx=p.x+Math.cos(la)*r,ly=p.y+Math.sin(la)*r*TILT;
  X.fillStyle='rgba(107,170,238,0.2)';X.font='8px Space Mono,monospace';
  X.textAlign='center';X.fillText('LUNAR ORBIT',lx,ly-6);
}

function drawTrails(){
  if(trail.length<2)return;
  X.lineCap='round';X.lineJoin='round';
  // Draw outbound and inbound as two continuous paths
  const paths={out:[],inb:[]};
  for(let i=0;i<trail.length;i++){
    const pt=trail[i],p=scr(pt.x,pt.y);
    const isOut=pt.phase==='outbound'||pt.phase==='tli';
    (isOut?paths.out:paths.inb).push(p);
  }
  function strokePath(pts,color){
    if(pts.length<2)return;
    X.strokeStyle=color;X.lineWidth=Math.max(1.5,2*zoom);
    X.beginPath();X.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)X.lineTo(pts[i].x,pts[i].y);
    X.stroke();
  }
  strokePath(paths.out,'rgba(46,107,191,0.7)');
  strokePath(paths.inb,'rgba(232,112,64,0.7)');
}

function drawOrion(px,py,angle,scale,phase){
  const u=scale*5; // base unit = CM half-width
  X.save();X.translate(px,py);

  if(phase==='tli'){
    // TLI: CM + ESM + ICPS with engine fire
    X.rotate(angle);
    // ICPS (tall cylinder below ESM) - direction: nose up (+y), engine down (-y)
    X.fillStyle='#E5E0D5';X.fillRect(-u*0.5,-u*3.5,u*1.0,u*2.7);
    X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=0.5;X.strokeRect(-u*0.5,-u*3.5,u*1.0,u*2.7);
    // ESM (gold cylinder)
    X.fillStyle='#C5952B';X.fillRect(-u*0.5,-u*0.8,u*1.0,u*0.8);
    X.fillStyle='#8B6914';X.fillRect(-u*0.5,-u*0.4,u*1.0,u*0.1);
    // CM (truncated cone, wide base down)
    X.fillStyle='#E8ECF0';X.beginPath();
    X.moveTo(-u*0.5,0);X.lineTo(u*0.5,0);X.lineTo(u*0.2,u*0.66);X.lineTo(-u*0.2,u*0.66);X.closePath();X.fill();
    // Heat shield
    X.fillStyle='#3D3225';X.fillRect(-u*0.52,-u*0.06,u*1.04,u*0.06);
    // Engine fire
    const fl=u*(3+Math.random()*2);
    const gf=X.createLinearGradient(0,-u*3.5,0,-u*3.5-fl);
    gf.addColorStop(0,'rgba(255,220,80,0.95)');gf.addColorStop(0.3,'rgba(255,120,20,0.7)');gf.addColorStop(1,'transparent');
    X.fillStyle=gf;X.beginPath();X.moveTo(-u*0.35,-u*3.5);X.lineTo(0,-u*3.5-fl);X.lineTo(u*0.35,-u*3.5);X.fill();
    const gf2=X.createLinearGradient(0,-u*3.5,0,-u*3.5-fl*0.5);
    gf2.addColorStop(0,'rgba(255,255,200,0.9)');gf2.addColorStop(1,'transparent');
    X.fillStyle=gf2;X.beginPath();X.moveTo(-u*0.12,-u*3.5);X.lineTo(0,-u*3.5-fl*0.5);X.lineTo(u*0.12,-u*3.5);X.fill();

  } else if(phase==='reentry'){
    // Reentry: CM only + 3 parachutes (red & white gores)
    // Parachutes
    for(let ci=-1;ci<=1;ci++){
      const cx=ci*u*1.4,cy=-u*4.5,cR=u*1.5;
      for(let s=0;s<8;s++){
        X.fillStyle=s%2===0?'rgba(252,61,33,0.75)':'rgba(240,240,240,0.75)';
        X.beginPath();X.moveTo(cx,cy);X.arc(cx,cy,cR,Math.PI+s*Math.PI/8,Math.PI+(s+1)*Math.PI/8);X.closePath();X.fill();
      }
      // Riser lines
      X.strokeStyle='rgba(192,192,192,0.3)';X.lineWidth=0.5;
      X.beginPath();X.moveTo(cx-cR,cy);X.lineTo(-u*0.1,u*0.3);X.stroke();
      X.beginPath();X.moveTo(cx+cR,cy);X.lineTo(u*0.1,u*0.3);X.stroke();
      X.beginPath();X.moveTo(cx,cy);X.lineTo(0,u*0.3);X.stroke();
    }
    // CM capsule (scorched)
    X.fillStyle='#8B7355';X.beginPath();
    X.moveTo(-u*0.5,0);X.lineTo(u*0.5,0);X.lineTo(u*0.2,u*0.66);X.lineTo(-u*0.2,u*0.66);X.closePath();X.fill();
    // Heat shield
    X.fillStyle='#3D3225';X.fillRect(-u*0.52,-u*0.06,u*1.04,u*0.06);

  } else {
    // Cruise: CM + ESM + X-pattern solar arrays
    X.rotate(angle);
    // Solar arrays (4 wings in X-pattern, side view shows 2 pairs)
    X.fillStyle='#1A1E3A';
    // Upper-left & upper-right arrays
    X.save();X.rotate(0.4);
    X.fillRect(-u*3.5,-u*0.15,u*3.0,u*0.3);
    X.fillRect(u*0.5,-u*0.15,u*3.0,u*0.3);
    X.restore();
    X.save();X.rotate(-0.4);
    X.fillRect(-u*3.5,-u*0.15,u*3.0,u*0.3);
    X.fillRect(u*0.5,-u*0.15,u*3.0,u*0.3);
    X.restore();
    // Panel grid lines
    X.strokeStyle='rgba(160,168,184,0.2)';X.lineWidth=0.3;
    for(let r=-1;r<=1;r+=2){
      X.save();X.rotate(r*0.4);
      for(let i=1;i<4;i++){X.beginPath();X.moveTo(-u*0.5-i*u*0.9,-u*0.15);X.lineTo(-u*0.5-i*u*0.9,u*0.15);X.stroke();
        X.beginPath();X.moveTo(u*0.5+i*u*0.9,-u*0.15);X.lineTo(u*0.5+i*u*0.9,u*0.15);X.stroke();}
      X.restore();
    }
    // ESM body (gold MLI)
    X.fillStyle='#C5952B';X.fillRect(-u*0.5,-u*0.8,u*1.0,u*0.8);
    X.fillStyle='#8B6914';X.fillRect(-u*0.5,-u*0.4,u*1.0,u*0.08);
    // OMS engine bell
    X.fillStyle='#5A5A5A';X.fillRect(-u*0.12,-u*0.95,u*0.24,u*0.15);
    // CM (truncated cone)
    const cmG=X.createLinearGradient(-u*0.5,0,u*0.5,0);
    cmG.addColorStop(0,'#D0D4DC');cmG.addColorStop(0.5,'#E8ECF0');cmG.addColorStop(1,'#D0D4DC');
    X.fillStyle=cmG;X.beginPath();
    X.moveTo(-u*0.5,0);X.lineTo(u*0.5,0);X.lineTo(u*0.2,u*0.66);X.lineTo(-u*0.2,u*0.66);X.closePath();X.fill();
    // Docking port
    X.fillStyle='#A0A0A0';X.fillRect(-u*0.1,u*0.62,u*0.2,u*0.08);
    // Heat shield
    X.fillStyle='#3D3225';X.fillRect(-u*0.52,-u*0.04,u*1.04,u*0.04);
    // Windows
    X.fillStyle='#2A2A2A';
    X.fillRect(-u*0.25,u*0.2,u*0.06,u*0.06);
    X.fillRect(-u*0.02,u*0.25,u*0.06,u*0.06);
    X.fillRect(u*0.2,u*0.2,u*0.06,u*0.06);
  }
  X.restore();
}

// Phase display info
const phaseInfo={
  tli:{name:'TLI BURN',color:'var(--red)',label:'主力エンジンを噴射 — 月まで推進'},
  outbound:{name:'TRANS-LUNAR',color:'var(--out)',label:'月へ向かう往路'},
  flyby:{name:'LUNAR FLYBY',color:'#CCC',label:'月に接近通過'},
  inbound:{name:'EARTH RETURN',color:'var(--inb)',label:'地球へ帰還'},
  reentry:{name:'SPLASHDOWN',color:'#0C6',label:'太平洋に着水 — MISSION COMPLETE'}
};

// ============================================================
// HUD UPDATE
// ============================================================
function updateHUD(state){
  const spd=Math.hypot(state.vx,state.vy);
  const alt=Math.hypot(state.x,state.y)-RE;
  document.getElementById('hS').innerHTML=(spd/1000).toFixed(1)+'<span> KM/S</span>';
  document.getElementById('hA').innerHTML=Math.max(0,alt/1000|0).toLocaleString()+'<span> KM</span>';
  const info=phaseInfo[state.phase]||phaseInfo.outbound;
  const tag=document.getElementById('hP');
  tag.textContent=info.name;tag.style.color=info.color;tag.style.borderColor=info.color;
  document.getElementById('hD').textContent=(state.t/86400).toFixed(1);
  const t=state.t|0,h=t/3600|0,mi=(t%3600)/60|0,s=t%60;
  document.getElementById('timer').textContent=`T+ ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pl=document.getElementById('phase-label');pl.textContent=info.label;pl.style.color=info.color;
}

// ============================================================
// MAIN LOOP
// ============================================================
let simState = initSimulation();
let missionComplete = false;
const simDt = 30; // physics timestep: 30 seconds
const stepsPerFrame = [1, 3, 5, 10, 20, 50];
let spdIdx = 4;
let paused = false;

document.getElementById('speed').addEventListener('click', () => {
  spdIdx = (spdIdx + 1) % stepsPerFrame.length;
  document.getElementById('speed').textContent = 'x' + stepsPerFrame[spdIdx];
});

function togglePause() {
  paused = !paused;
  document.getElementById('pause').textContent = paused ? '▶ PLAY' : '❚❚ PAUSE';
}

function resetSim() {
  paused = false;
  document.getElementById('pause').textContent = '❚❚ PAUSE';
  missionComplete = false;
  simState = initSimulation();
  trail.length = 0;
  camX = 0; camY = 0; zoom = 1;
}

function loop() {
  X.clearRect(0, 0, W, H);
  drawStars();

  if (!missionComplete && !paused) {
    const steps = stepsPerFrame[spdIdx];
    for (let i = 0; i < steps; i++) {
      // Step physics
      const done = stepPhysics(simState, simDt);

      // Record trail
      if (trail.length === 0 || simState.t - trail[trail.length-1].t >= 300) {
        trail.push({ x: simState.x, y: simState.y, phase: simState.phase, t: simState.t });
      }

      if (done) { missionComplete = true; break; }
    }
  }

  updateCam(simState);
  drawMoonOrbit(simState.moonX, simState.moonY);
  drawTrails();
  drawBody(0, 0, 16, ['#6BAAEE','#0B3D91','rgba(30,80,200,0.08)'], 'EARTH');
  drawBody(simState.moonX, simState.moonY, 7, ['#E0E0E0','#808080','rgba(200,200,210,0.04)'], 'MOON');

  // Draw Orion
  const p = scr(simState.x, simState.y);
  const ang = Math.atan2(simState.vy, simState.vx);
  drawOrion(p.x, p.y, ang, Math.max(0.8, zoom)*1.1, simState.phase);
  X.fillStyle = 'rgba(255,255,255,0.35)';
  X.font = `${Math.max(8,9*zoom)}px Space Mono,monospace`;
  X.textAlign = 'center';
  X.fillText('ORION', p.x, p.y - 12*zoom);

  updateHUD(simState);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
